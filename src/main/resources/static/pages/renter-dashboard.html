<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Renter Dashboard - Carbook</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/open-iconic-bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/animate.css">
    <link rel="stylesheet" href="../assets/css/owl.carousel.min.css">
    <link rel="stylesheet" href="../assets/css/owl.theme.default.min.css">
    <link rel="stylesheet" href="../assets/css/magnific-popup.css">
    <link rel="stylesheet" href="../assets/css/aos.css">
    <link rel="stylesheet" href="../assets/css/ionicons.min.css">
    <link rel="stylesheet" href="../assets/css/bootstrap-datepicker.css">
    <link rel="stylesheet" href="../assets/css/jquery.timepicker.css">
    <link rel="stylesheet" href="../assets/css/flaticon.css">
    <link rel="stylesheet" href="../assets/css/icomoon.css">
    <link rel="stylesheet" href="../assets/css/style.css">
  </head>
  <body class="login-page-body auth-page-renter-dashboard">
    <main class="account-shell">
      <aside class="account-sidebar">
        <a href="../index.html" class="account-brand">Carbook</a>
        <nav class="account-menu">
          <a href="renter-dashboard.html" class="account-menu-item active"><span class="icon-car"></span> My Vehicles</a>
          <a href="account.html" class="account-menu-item"><span class="icon-user"></span> My Profile</a>
          <a href="../index.html" class="account-menu-item"><span class="icon-home"></span> Home</a>
          <a href="car-single.html" class="account-menu-item"><span class="icon-grid"></span> Cars</a>
          <a href="pricing.html" class="account-menu-item"><span class="icon-money"></span> Pricing</a>
          <a href="contact.html" class="account-menu-item"><span class="icon-envelope-o"></span> Contact</a>
        </nav>
        <button id="renterLogoutBtn" type="button" class="account-logout-btn"><span class="icon-power-off"></span> Logout</button>
      </aside>

      <section class="account-main">
        <header class="account-topbar">
          <div class="account-topbar-title-wrap">
            <h1 class="account-topbar-title">Renter Dashboard</h1>
            <p class="account-topbar-subtitle">Add your own vehicles and track approval status.</p>
          </div>
          <div class="account-topbar-user">
            <span class="account-avatar">R</span>
            <div>
              <strong id="renterProfileName">Renter</strong>
              <p id="renterProfileMeta" class="account-meta">-</p>
            </div>
          </div>
        </header>

        <div class="admin-grid">
          <article class="account-card account-form-card">
            <h2>Add or Update Vehicle</h2>
            <form id="vehicleForm" class="account-form" novalidate>
              <input id="vehicleIdField" type="hidden">

              <div class="account-form-row">
                <div>
                  <label for="vehicleBrandField">Brand</label>
                  <input id="vehicleBrandField" type="text" placeholder="e.g., Toyota" required>
                </div>
                <div>
                  <label for="vehicleModelField">Model</label>
                  <input id="vehicleModelField" type="text" placeholder="e.g., Prius" required>
                </div>
              </div>

              <div class="account-form-row">
                <div>
                  <label for="vehicleYearField">Year</label>
                  <input id="vehicleYearField" type="number" min="1990" placeholder="e.g., 2024" required>
                </div>
                <div>
                  <label for="vehiclePriceField">Price Per Day (USD)</label>
                  <input id="vehiclePriceField" type="number" min="1" step="0.01" placeholder="e.g., 55.00" required>
                </div>
              </div>

              <div class="account-form-row single">
                <div>
                  <label for="vehicleImageField">Image URL (optional)</label>
                  <input id="vehicleImageField" type="url" placeholder="https://example.com/car.jpg">
                </div>
              </div>

              <div class="account-form-row single">
                <div>
                  <label for="vehicleDescriptionField">Description</label>
                  <textarea id="vehicleDescriptionField" rows="3" placeholder="Describe this vehicle..." required></textarea>
                </div>
              </div>

              <div class="vehicle-form-actions">
                <button id="vehicleSubmitBtn" type="submit" class="account-btn-primary">Submit Vehicle</button>
                <button id="vehicleClearBtn" type="button" class="account-btn-secondary">Clear</button>
              </div>
            </form>
            <p id="vehicleFeedback" class="auth-feedback" aria-live="polite"></p>
          </article>

          <article class="account-card account-form-card">
            <h2>My Vehicle Listings</h2>
            <div class="table-responsive admin-table-wrap">
              <table class="table admin-table">
                <thead>
                  <tr>
                    <th>Brand</th>
                    <th>Model</th>
                    <th>Year</th>
                    <th>Per Day</th>
                    <th>Status</th>
                    <th>Edit</th>
                    <th>Delete</th>
                  </tr>
                </thead>
                <tbody id="renterVehiclesTableBody"></tbody>
              </table>
            </div>
            <p id="vehicleListFeedback" class="auth-feedback" aria-live="polite"></p>
          </article>
        </div>
      </section>
    </main>

    <script src="../assets/js/jquery.min.js"></script>
    <script src="../assets/js/jquery-migrate-3.0.1.min.js"></script>
    <script src="../assets/js/popper.min.js"></script>
    <script src="../assets/js/bootstrap.min.js"></script>
    <script src="../assets/js/jquery.easing.1.3.js"></script>
    <script src="../assets/js/jquery.waypoints.min.js"></script>
    <script src="../assets/js/jquery.stellar.min.js"></script>
    <script src="../assets/js/owl.carousel.min.js"></script>
    <script src="../assets/js/jquery.magnific-popup.min.js"></script>
    <script src="../assets/js/aos.js"></script>
    <script src="../assets/js/jquery.animateNumber.min.js"></script>
    <script src="../assets/js/bootstrap-datepicker.js"></script>
    <script src="../assets/js/jquery.timepicker.min.js"></script>
    <script src="../assets/js/scrollax.min.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/auth.js"></script>
  </body>
</html>
