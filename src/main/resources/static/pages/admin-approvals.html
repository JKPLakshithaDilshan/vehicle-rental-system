  <body class="login-page-body auth-page-admin-approvals">
    <main class="account-shell admin-shell">
      <aside class="account-sidebar">
        <div class="account-brand">Admin Panel</div>
        <nav class="account-menu">
          <a href="admin-dashboard.html" class="account-menu-item"><span class="icon-dashboard"></span> Dashboard</a>
          <a href="admin-approvals.html" class="account-menu-item active"><span class="icon-check"></span> Vehicle Approvals</a>
          <a href="../index.html" class="account-menu-item"><span class="icon-home"></span> Home</a>
          <a href="car-single.html" class="account-menu-item"><span class="icon-car"></span> Cars</a>

        </nav>
        <button id="adminApprovalsLogoutBtn" type="button" class="account-logout-btn"><span class="icon-power-off"></span> Logout</button>
      </aside>

      <section class="account-main">
        <header class="account-topbar">
          <div class="account-topbar-title-wrap">
            <h1 class="account-topbar-title">Vehicle Approvals</h1>
            <p class="account-topbar-subtitle">Review renter-submitted vehicles and approve or reject quickly.</p>
          </div>
          <div class="account-topbar-user">
            <span class="account-avatar">A</span>
            <div>
              <strong id="adminApprovalsName">Admin</strong>
              <p id="adminApprovalsMeta" class="account-meta">-</p>
            </div>
          </div>
        </header>

        <article class="account-card account-form-card">
          <h2>Pending Queue</h2>
          <div class="table-responsive admin-table-wrap">
            <table class="table admin-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Renter ID</th>
                  <th>Brand</th>
                  <th>Model</th>
                  <th>Year</th>
                  <th>Per Day</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="pendingVehiclesTableBody"></tbody>
            </table>
          </div>
          <p id="approvalsFeedback" class="auth-feedback" aria-live="polite"></p>
        </article>
      </section>
