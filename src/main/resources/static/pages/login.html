<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Login - Carbook</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/open-iconic-bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/animate.css">
    <link rel="stylesheet" href="../assets/css/owl.carousel.min.css">
    <link rel="stylesheet" href="../assets/css/owl.theme.default.min.css">
    <link rel="stylesheet" href="../assets/css/magnific-popup.css">
    <link rel="stylesheet" href="../assets/css/aos.css">
    <link rel="stylesheet" href="../assets/css/ionicons.min.css">
    <link rel="stylesheet" href="../assets/css/bootstrap-datepicker.css">
    <link rel="stylesheet" href="../assets/css/jquery.timepicker.css">
    <link rel="stylesheet" href="../assets/css/flaticon.css">
    <link rel="stylesheet" href="../assets/css/icomoon.css">
    <link rel="stylesheet" href="../assets/css/style.css">
  </head>
  <body class="login-page-body auth-page-login">
    <nav class="navbar navbar-expand-lg navbar-dark ftco_navbar bg-dark ftco-navbar-light login-top-nav" id="ftco-navbar">
      <div class="container">
        <a class="navbar-brand" href="../index.html">Car<span>Book</span></a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#ftco-nav" aria-controls="ftco-nav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="oi oi-menu"></span> Menu
        </button>

        <div class="collapse navbar-collapse" id="ftco-nav">
          <ul class="navbar-nav ml-auto">
            <li class="nav-item"><a href="../index.html" class="nav-link">Home</a></li>
            <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
            <li class="nav-item"><a href="services.html" class="nav-link">Services</a></li>
            <li class="nav-item"><a href="pricing.html" class="nav-link">Pricing</a></li>
            <li class="nav-item"><a href="car-single.html" class="nav-link">Cars</a></li>
            <li class="nav-item"><a href="signup.html" class="nav-link rent-vehicle-link">Rent Vehicle</a></li>
            <li class="nav-item"><a href="contact.html" class="nav-link">Contact</a></li>
            <li class="nav-item cta active"><a href="login.html" class="nav-link"><span>Login</span></a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="login-main-wrap">
      <section class="login-card" aria-labelledby="loginHeading">
        <h1 id="loginHeading" class="login-title">Welcome back</h1>
        <p class="login-subtitle">Welcome back! Please enter your details.</p>

        <form id="loginForm" action="#" method="post" class="login-form" novalidate>
          <label class="login-label" for="email">Email</label>
          <input id="email" name="email" type="email" class="login-input" placeholder="Enter your email" autocomplete="email">

          <label class="login-label" for="password">Password</label>
          <input id="password" name="password" type="password" class="login-input" placeholder="Password" autocomplete="current-password">

          <a class="login-forgot" href="#">Forgot password</a>

          <button type="submit" class="login-btn-primary">Login</button>
          <button id="googleSigninBtn" type="button" class="login-btn-google">
            <span class="google-mark">G</span>
            <span>Sign in with Google</span>
          </button>
        </form>

        <p id="authFeedback" class="auth-feedback" aria-live="polite"></p>
        <p class="login-signup-text">Don't have an account? <a href="signup.html">Sign up for free</a></p>
      </section>
    </main>

    <script src="../assets/js/jquery.min.js"></script>
    <script src="../assets/js/jquery-migrate-3.0.1.min.js"></script>
    <script src="../assets/js/popper.min.js"></script>
    <script src="../assets/js/bootstrap.min.js"></script>
    <script src="../assets/js/jquery.easing.1.3.js"></script>
    <script src="../assets/js/jquery.waypoints.min.js"></script>
    <script src="../assets/js/jquery.stellar.min.js"></script>
    <script src="../assets/js/owl.carousel.min.js"></script>
    <script src="../assets/js/jquery.magnific-popup.min.js"></script>
    <script src="../assets/js/aos.js"></script>
    <script src="../assets/js/jquery.animateNumber.min.js"></script>
    <script src="../assets/js/bootstrap-datepicker.js"></script>
    <script src="../assets/js/jquery.timepicker.min.js"></script>
    <script src="../assets/js/scrollax.min.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/auth.js"></script>
  </body>
</html>
